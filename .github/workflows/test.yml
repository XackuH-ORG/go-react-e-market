name: Test Self-Hosted Runner

# Запускать при каждом пуше в ветку main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check-system:
    # ОЧЕНЬ ВАЖНО: указываем, что работать должно на твоем Mac Mini
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: System Info
        run: |
          echo "Привет, Саша и Андрей! CI/CD работает."
          echo "Сервер: $(hostname)"
          echo "ОС: $(cat /etc/os-release | grep PRETTY_NAME)"
          echo "Текущая папка: $(pwd)"

      - name: Check Tools
        run: |
          echo "Проверяем наличие установленного софта на Mac Mini:"
          go version || echo "Go не установлен"
          node -v || echo "Node.js не установлен"
          docker -v || echo "Docker не установлен"

      - name: Final Success Message
        run: echo "Пайплайн успешно прошел на локальном железе!"